name: lumineer

services:
  # =============================================================================
  # Infrastructure services (always start with: docker compose up -d)
  # =============================================================================

  postgres:
    image: postgres:16
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=lumineer
      - POSTGRES_PASSWORD=lumineer
      - POSTGRES_DB=lumineer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumineer"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # =============================================================================
  # App services (start with: docker compose --profile app up -d)
  # For local development, run each service directly from the worktree instead:
  #   backend: cd backend && bun dev
  #   ai:      cd ai && uv run python main.py
  #   frontend: cd frontend && bun dev
  # =============================================================================

  gateway:
    profiles: [app]
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    volumes:
      - ./gateway:/app
      - /app/node_modules
    environment:
      - PORT=3000
      - BACKEND_URL=http://backend:3001
      - ALLOWED_ORIGINS=http://localhost:${FRONTEND_PORT:-5173}
    depends_on:
      - backend

  frontend:
    profiles: [app]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:${GATEWAY_PORT:-3000}
    depends_on:
      - gateway

  backend:
    profiles: [app]
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file: .env.local
    environment:
      - APP_ENV=dev
      - PORT=3001
      - AI_PROCESSING_URL=http://ai:8001
      - DATABASE_URL=postgres://lumineer:lumineer@postgres:5432/lumineer
      - JWT_SECRET=dev-secret-change-in-prod-min-16chars
    depends_on:
      postgres:
        condition: service_healthy
      ai:
        condition: service_started

  ai:
    profiles: [app]
    build:
      context: ./ai
      dockerfile: Dockerfile
    ports:
      - "${AI_PORT:-8001}:8001"
    volumes:
      - ./ai:/app
    env_file: .env.local
    environment:
      - APP_ENV=dev
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant

  # =============================================================================
  # Observability (start with: docker compose --profile observability up -d)
  # =============================================================================

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    profiles:
      - observability

  grafana:
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT:-3002}:3000"
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - prometheus
    profiles:
      - observability

  langfuse:
    image: langfuse/langfuse:latest
    ports:
      - "${LANGFUSE_PORT:-3003}:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=dev-secret-change-in-prod
      - NEXTAUTH_URL=http://localhost:${LANGFUSE_PORT:-3003}
      - SALT=dev-salt-change-in-prod
    depends_on:
      - langfuse-db
    profiles:
      - observability

  langfuse-db:
    image: postgres:16
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    profiles:
      - observability

volumes:
  qdrant_data:
  postgres_data:
  grafana_data:
  langfuse_db_data:
