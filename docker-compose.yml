services:
  # =============================================================================
  # App services
  # =============================================================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=lumineer
      - POSTGRES_PASSWORD=lumineer
      - POSTGRES_DB=lumineer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumineer"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file: .env.local
    environment:
      - APP_ENV=dev
      - AI_SERVICE_URL=http://ai:8001
      - DATABASE_URL=postgres://lumineer:lumineer@postgres:5432/lumineer
      - JWT_SECRET=dev-secret-change-in-prod-min-16chars
    depends_on:
      postgres:
        condition: service_healthy
      ai:
        condition: service_started

  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./ai:/app
    env_file: .env.local
    environment:
      - APP_ENV=dev
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # =============================================================================
  # Observability
  # =============================================================================

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    profiles:
      - observability

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - prometheus
    profiles:
      - observability

  langfuse:
    image: langfuse/langfuse:latest
    ports:
      - "3002:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=dev-secret-change-in-prod
      - NEXTAUTH_URL=http://localhost:3002
      - SALT=dev-salt-change-in-prod
    depends_on:
      - langfuse-db
    profiles:
      - observability

  langfuse-db:
    image: postgres:16
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    profiles:
      - observability

volumes:
  qdrant_data:
  postgres_data:
  grafana_data:
  langfuse_db_data:
