name: LLM Eval (Stage 2)

on:
  pull_request:
    branches: [develop, main]
    paths:
      - "ai/app/agents/**"
      - "ai/app/tools/**"
      - "ai/app/prompts/**"
      - "ai/app/infrastructure/**"
      - "ai/app/domain/**"
      - "ai/app/config/**"
      - "ai/evals/**"

permissions:
  contents: read

jobs:
  llm-eval:
    name: DeepEval (Faithfulness + Hallucination)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ai
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: uv sync --dev

      - name: Run LLM Evaluations
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run python scripts/run_evals.py --verbose
