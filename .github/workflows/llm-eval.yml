name: LLM Eval (Stage 2)

on:
  pull_request:
    branches: [develop, main]
    paths:
      - "ai/app/agents/**"
      - "ai/app/tools/**"
      - "ai/app/prompts/**"
      - "ai/app/infrastructure/**"
      - "ai/app/domain/**"
      - "ai/app/config/**"
      - "ai/evals/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  llm-eval:
    name: DeepEval (Faithfulness + Hallucination)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ai
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: uv sync --dev

      - name: Run LLM Evaluations
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run python scripts/run_evals.py --verbose

      - name: Post eval summary to PR
        if: always()
        uses: actions/github-script@v7
        env:
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const status = process.env.JOB_STATUS;
            const body = `### 🤖 LLM Eval (Stage 2)

            **Status**: ${status}

            Tier 1 thresholds:
            | Metric | Threshold |
            |--------|-----------|
            | Faithfulness | ≥ 0.70 |
            | Hallucination | ≤ 0.50 |

            > Run locally: \`cd ai && uv run python scripts/run_evals.py --verbose\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body.trim()
            });
