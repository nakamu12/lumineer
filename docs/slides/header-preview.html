<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=200">
<title>Header Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; font-family: ui-sans-serif, system-ui, sans-serif; background: #fff; }

  header {
    width: 100%;
    border-bottom: 1px solid hsl(214.3, 31.8%, 91.4%);
    background: rgba(255,255,255,0.95);
  }
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem;
    display: flex;
    height: 56px;
    align-items: center;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 6px; /* gap-1.5 */
    font-weight: 600;
    text-decoration: none;
  }
  .logo svg {
    width: 20px;
    height: 20px;
    color: #14b8a6;
  }
  .logo-text {
    background: linear-gradient(to right, #14b8a6, #3b82f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size: 16px;
  }
  nav {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  nav a {
    padding: 8px 12px;
    font-size: 14px;
    border-radius: 6px;
    text-decoration: none;
    color: hsl(215.4, 16.3%, 46.9%);
  }
  nav a.active {
    color: hsl(173, 58%, 39%);
    font-weight: 500;
  }
  .signin {
    margin-left: 8px;
    padding: 6px 16px;
    font-size: 14px;
    border-radius: 6px;
    background: hsl(173, 58%, 39%);
    color: white;
    text-decoration: none;
    font-weight: 500;
  }

  .compare {
    padding: 20px 2rem;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .compare-label {
    font-size: 13px;
    color: #94a3b8;
  }
  .compare-row {
    display: flex;
    align-items: center;
    gap: 40px;
  }
  .gap-demo {
    display: flex;
    align-items: center;
    font-weight: 600;
    text-decoration: none;
  }
  .gap-demo svg { width: 20px; height: 20px; color: #14b8a6; }
  .gap-demo .logo-text { font-size: 16px; }
  .gap-8 { gap: 8px; }
  .gap-6 { gap: 6px; }
  .tag {
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 4px;
    background: #f1f5f9;
    color: #64748b;
  }
  .tag-new {
    background: #d1fae5;
    color: #065f46;
  }
</style>
</head>
<body>
  <header>
    <div class="container">
      <a class="logo" href="#">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
        <span class="logo-text">Lumineer</span>
      </a>
      <nav>
        <a href="#" class="active">Home</a>
        <a href="#">Explore</a>
        <a href="#">Chat</a>
        <a href="#">My Path</a>
        <a href="#">Settings</a>
      </nav>
      <a class="signin" href="#">Sign In</a>
    </div>
  </header>

  <div class="compare">
    <div class="compare-label">Gap comparison</div>
    <div class="compare-row">
      <div class="gap-demo gap-8">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
        <span class="logo-text">Lumineer</span>
      </div>
      <span class="tag">Before: gap-2 (8px)</span>
    </div>
    <div class="compare-row">
      <div class="gap-demo gap-6">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
        <span class="logo-text">Lumineer</span>
      </div>
      <span class="tag tag-new">After: gap-1.5 (6px)</span>
    </div>
  </div>
</body>
</html>
