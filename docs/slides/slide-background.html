<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Lumineer Slide Background</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    background: #f8fafb;
    position: relative;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  /* Main gradient blob - anchored to bottom-right corner */
  .blob-main {
    position: absolute;
    right: -200px;
    bottom: -350px;
    width: 1100px;
    height: 1100px;
    border-radius: 50%;
    background: radial-gradient(
      circle at 42% 32%,
      rgba(255, 255, 255, 1) 0%,
      rgba(255, 255, 255, 0.95) 18%,
      rgba(255, 255, 255, 0.8) 25%,
      rgba(153, 246, 228, 0.4) 35%,
      rgba(45, 212, 191, 0.5) 45%,
      rgba(59, 130, 246, 0.45) 58%,
      rgba(99, 102, 241, 0.25) 72%,
      transparent 90%
    );
    filter: blur(30px);
  }

  /* Secondary glow - overlapping, adds teal-to-blue transition */
  .blob-secondary {
    position: absolute;
    right: 30px;
    bottom: -50px;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(
      circle,
      rgba(45, 212, 191, 0.2) 0%,
      rgba(59, 130, 246, 0.2) 40%,
      rgba(99, 102, 241, 0.1) 65%,
      transparent 85%
    );
    filter: blur(50px);
  }

  /* Subtle ambient glow extending left for soft fade */
  .blob-accent {
    position: absolute;
    right: 350px;
    bottom: 120px;
    width: 550px;
    height: 550px;
    border-radius: 50%;
    background: radial-gradient(
      circle,
      rgba(94, 234, 212, 0.1) 0%,
      rgba(59, 130, 246, 0.05) 50%,
      transparent 75%
    );
    filter: blur(45px);
  }

  /* Logo placeholder area - top left */
  .logo-area {
    position: absolute;
    top: 32px;
    left: 32px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .logo-square {
    width: 32px;
    height: 32px;
    border-radius: 5px;
  }

  .logo-square.teal {
    background: #2dd4bf;
  }

  .logo-square.blue {
    background: #3b82f6;
  }

</style>
</head>
<body>
  <div class="blob-accent"></div>
  <div class="blob-secondary"></div>
  <div class="blob-main"></div>

  <!-- Logo placeholder (same layout as sample) -->
  <div class="logo-area">
    <div class="logo-square teal"></div>
    <div class="logo-square blue"></div>
  </div>
</body>
</html>
